name: WaifuX
options:
  bundleIdPrefix: com.waifux
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"

# 共享 Scheme 纳入仓库，避免仅存在 xcuserdata 时换机/重装后 Cmd+R 无可用方案
schemes:
  WaifuX:
    build:
      targets:
        WaifuX: all
    run:
      config: Debug
    archive:
      config: Release

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.2.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.8.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  WaifuX:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Utilities
      - path: Components
      - path: DesignSystem
      - path: Assets.xcassets
      # 含 wallpaperengine-cli（材质已嵌入二进制尾部）、dylib、JSON 等；assets/ 仅用于构建 CLI，不复制进 .app
      - path: Resources
        type: folder
        buildPhase: resources
        excludes:
          - assets
          - assets/**
      - path: AnimeRules
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: WaifuX
        PRODUCT_BUNDLE_IDENTIFIER: com.waifux.app
        MARKETING_VERSION: 38.0.67
        CURRENT_PROJECT_VERSION: 38
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
    dependencies:
      - package: SwiftSoup
      - package: Kanna
      - package: Kingfisher
    entitlements:
      path: WaifuX.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
