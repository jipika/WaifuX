name: WaifuX
options:
  bundleIdPrefix: com.waifux
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"

# 共享 Scheme 纳入仓库，避免仅存在 xcuserdata 时换机/重装后 Cmd+R 无可用方案
schemes:
  WaifuX:
    build:
      targets:
        WaifuX: all
    run:
      config: Debug
    archive:
      config: Release

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.2.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.8.0"
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    from: "2.3.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  WaifuX:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Utilities
      - path: Components
      - path: DesignSystem
      - path: Assets.xcassets
      # 含 wallpaperengine-cli（材质已嵌入二进制尾部）、dylib、JSON 等；assets/ 仅用于构建 CLI，不复制进 .app
      - path: Resources
        type: folder
        buildPhase: resources
        excludes:
          - assets
          - assets/**
      - path: AnimeRules
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: WaifuX
        PRODUCT_BUNDLE_IDENTIFIER: com.waifux.app
        MARKETING_VERSION: 38.0.83
        CURRENT_PROJECT_VERSION: 38
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
    dependencies:
      - package: SwiftSoup
      - package: Kanna
      - package: Kingfisher
      - package: KSPlayer
    postBuildScripts:
      - name: Fix FFmpeg Framework Bundles
        basedOnDependencyAnalysis: false
        script: |
          FRAMEWORKS_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Frameworks"
          if [ -d "$FRAMEWORKS_DIR" ]; then
            for framework in "$FRAMEWORKS_DIR"/*.framework; do
              if [ -f "$framework/Info.plist" ]; then
                mkdir -p "$framework/Versions/Current/Resources"
                if [ ! -f "$framework/Versions/Current/Resources/Info.plist" ]; then
                  mv "$framework/Info.plist" "$framework/Versions/Current/Resources/Info.plist"
                  ln -sf "Versions/Current/Resources/Info.plist" "$framework/Info.plist"
                fi
                if [ ! -L "$framework/Resources" ]; then
                  ln -sf "Versions/Current/Resources" "$framework/Resources"
                fi
                execName=$(basename "$framework" .framework)
                if [ -f "$framework/$execName" ] && [ ! -L "$framework/$execName" ]; then
                  mv "$framework/$execName" "$framework/Versions/Current/$execName"
                  ln -sf "Versions/Current/$execName" "$framework/$execName"
                fi
                if [ -d "$framework/Headers" ] && [ ! -L "$framework/Headers" ]; then
                  mv "$framework/Headers" "$framework/Versions/Current/Headers"
                  ln -sf "Versions/Current/Headers" "$framework/Headers"
                fi
                if [ -d "$framework/Modules" ] && [ ! -L "$framework/Modules" ]; then
                  mv "$framework/Modules" "$framework/Versions/Current/Modules"
                  ln -sf "Versions/Current/Modules" "$framework/Modules"
                fi
                # 移除旧的 CodeSignature（结构已被修改，旧签名失效，且根目录不能有 _CodeSignature）
                if [ -d "$framework/_CodeSignature" ]; then
                  rm -rf "$framework/_CodeSignature"
                fi
                # 清理 .DS_Store
                find "$framework" -name ".DS_Store" -delete 2>/dev/null || true
              fi
            done
          fi
    entitlements:
      path: WaifuX.entitlements
      properties:
        com.apple.security.network.client: true
