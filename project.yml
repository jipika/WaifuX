name: WaifuX
options:
  bundleIdPrefix: com.waifux
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"
  Kanna:
    url: https://github.com/tid-kijyun/Kanna.git
    from: "5.2.0"

settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  WaifuX:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Views
      - path: ViewModels
      - path: Models
      - path: Services
      - path: Utilities
      - path: Components
      - path: DesignSystem
      - path: Assets.xcassets
      - path: Resources
        type: folder
        buildPhase: resources
      - path: AnimeRules
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: WaifuX
        PRODUCT_BUNDLE_IDENTIFIER: com.waifux.app
        MARKETING_VERSION: 38.0.32
        CURRENT_PROJECT_VERSION: 38
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
    dependencies:
      - package: SwiftSoup
      - package: Kanna
    entitlements:
      path: WaifuX.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
