name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    # 仅在标签发布时创建 Draft Release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & Package
        run: |
          chmod +x ./scripts/package.sh
          ./scripts/package.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/WallHaven.dmg
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 仅测试构建（任何代码变更都会触发）
  test-build:
    runs-on: macos-latest
    # 排除标签推送，避免重复运行
    if: "!startsWith(github.ref, 'refs/tags/v')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: xcodebuild -project WallHaven.xcodeproj -scheme WallHaven build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO
