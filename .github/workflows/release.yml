name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# 仅当代码相关文件变化时触发构建
  paths:
    - '**.swift'
    - 'project.yml'
    - '**.yml'
    - 'App/**'
    - 'Views/**'
    - 'ViewModels/**'
    - 'Models/**'
    - 'Services/**'
    - 'Components/**'
    - 'Utilities/**'
    - 'DesignSystem/**'
    - 'Resources/**'
    - 'Scripts/**'
    - 'scripts/**'
    # 排除文档和配置文件
    - '!**.md'
    - '!CLAUDE.md'
    - '!README.md'
    - '!LICENSE'
    - '!CHANGELOG.md'
    - '!CONTRIBUTING.md'
    - '!.github/**'
    - '!Design/**'
    - '!Docs/**'
    - '!Tools/**'
    - '!Rules/**'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & Package
        run: |
          chmod +x ./scripts/package.sh
          ./scripts/package.sh

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/WallHaven.dmg
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建成功后通知（仅标签发布时）
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Create Release Notification
        run: |
          echo "✅ Release 构建成功！"
          echo "📦 下载地址: https://github.com/${{ github.repository }}/releases/latest"
