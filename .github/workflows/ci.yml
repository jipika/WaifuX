name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          echo "Xcode Path: $(xcode-select -p)"
          xcodebuild -version
          swift --version

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Install create-dmg
        run: brew install create-dmg || true

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build & Package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          chmod +x ./scripts/package.sh
          ./scripts/package.sh

      - name: Build (for PRs)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p build
          xcodebuild -project WaifuX.xcodeproj \
            -scheme WaifuX \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Build ${{ github.run_number }}
          body: |
            Auto-generated CI build
            
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/WaifuX.dmg
          asset_name: WaifuX.dmg
          asset_content_type: application/x-apple-diskimage
