name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26.4
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          echo "Xcode Path: $(xcode-select -p)"
          xcodebuild -version
          swift --version

      - name: Check XcodeGen
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Cache SPM Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build
        run: |
          mkdir -p build
          xcodebuild -project WallHaven.xcodeproj \
            -scheme WallHaven \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            SWIFT_STRICT_CONCURRENCY=minimal \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Upload Build Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: WaifuX-CI-Build
          path: |
            build/Build/Products/Release/WaifuX.app
          retention-days: 7
